name: Deploy production

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: vanda-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.vandastudio.app
    steps:
      - name: Check out production revision
        uses: actions/checkout@v4

      - name: Set up workspace
        uses: ./.github/actions/setup

      - name: Validate production revision
        run: |
          pnpm lint
          pnpm typecheck
          CI=true pnpm test
          pnpm build

      - name: Deploy Convex production
        working-directory: apps/vanda
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PROD_DEPLOY_KEY }}
        run: pnpm exec convex deploy --yes --typecheck try --message "production $GITHUB_SHA"

      - name: Create staged production deployment
        id: vercel
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_url=$(pnpm dlx vercel@latest deploy --yes --prod --skip-domain --token="$VERCEL_TOKEN")
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Promote staged deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: pnpm dlx vercel@latest promote "${{ steps.vercel.outputs.deployment_url }}" --yes --token="$VERCEL_TOKEN"

      - name: Smoke test production
        run: curl --fail --show-error --silent --retry 5 --retry-delay 3 https://app.vandastudio.app/ >/dev/null

      - name: Deployment summary
        run: |
          {
            echo "### Production deployment"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- URL: https://app.vandastudio.app"
            echo "- Vercel deployment: ${{ steps.vercel.outputs.deployment_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
